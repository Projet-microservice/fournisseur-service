<div class="sidebar-container">
  <div class="brand">
    <h2>Dashboard</h2>
  </div>
  <mat-nav-list>
    <a mat-list-item routerLink="/admin" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </a>
    <a mat-list-item routerLink="/fournisseurs" routerLinkActive="active-link">
      <mat-icon>business</mat-icon>
      <span>Fournisseurs</span>
    </a>
    <a mat-list-item routerLink="/users" routerLinkActive="active-link">
      <mat-icon>people</mat-icon>
      <span>Utilisateurs</span>
    </a>
  </mat-nav-list>

  <div class="user-info">
    <button mat-icon-button (click)="logout()" matTooltip="Déconnexion">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</div>
