<div class="panel">
  <div class="header">
    <h2>Gestion des Utilisateurs</h2>
    <div class="header-actions">
      <div class="search-pill">
        <mat-icon>search</mat-icon>
        <input #q type="text" (input)="applyFilter(q.value)" placeholder="Rechercher..." />
      </div>
      <button mat-raised-button color="primary" (click)="toggleForm()">
        <mat-icon>{{ showForm ? 'close' : 'person_add' }}</mat-icon>
        {{ showForm ? 'Annuler' : 'Ajouter' }}
      </button>
    </div>
  </div>

  <!-- Formulaire Ajout/Edition -->
  <mat-card class="form-card mat-elevation-z2" *ngIf="showForm">
    <mat-card-header>
      <mat-card-title>{{ editingUserId ? 'Modifier' : 'Ajouter un' }} Utilisateur</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="user-form">
        <mat-form-field appearance="outline">
          <mat-label>Nom</mat-label>
          <input matInput formControlName="name" placeholder="Nom complet">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="email@exemple.com">
        </mat-form-field>

        <mat-form-field appearance="outline" *ngIf="!editingUserId">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Min 6 caractères">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Rôle</mat-label>
          <select matNativeControl formControlName="role">
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" (click)="resetForm()">Annuler</button>
          <button mat-raised-button color="accent" type="submit" [disabled]="userForm.invalid">
            {{ editingUserId ? 'Enregistrer' : 'Créer' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <div class="loading" *ngIf="loading"><span class="loader"></span> Chargement des utilisateurs...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z4" *ngIf="!loading">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let user">{{ user.id }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
      <td mat-cell *matCellDef="let user">{{ user.name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Rôle</th>
      <td mat-cell *matCellDef="let user">
        <span class="role-badge" [class.admin]="user.role === 'ADMIN'">{{ user.role }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let user">
        <button mat-icon-button color="primary" (click)="edit(user)" aria-label="Editer">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="remove(user.id)" aria-label="Supprimer">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-paginator [length]="dataSource.data.length" [pageSize]="8" [hidePageSize]="true" [showFirstLastButtons]="true"></mat-paginator>
</div>
