server.port=8082

spring.application.name=fournisseurservice

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/fournisseur_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Eureka (desactive car pas de serveur Eureka dans ce projet) ---
# Pour activer : mettre eureka.client.enabled=true et lancer un Eureka Server sur le port 8761
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=when_authorized